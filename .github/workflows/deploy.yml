# Despliegue: build con pnpm (mismo lockfile que en local) y FTP del *contenido* de `.output/`
# hacia `public_html/` (Application Manager / cPanel). Trailing slash en local-dir = sube el interior
# de la carpeta, no la carpeta `.output` como un solo directorio remoto.
#
# Secretos obligatorios: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# Opcional: FTP_REMOTE_DIR — si no está definido, se usa public_html/

name: Deploy TradeERP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Subir contenido de .output a public_html (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./.output/
          server-dir: ${{ secrets.FTP_REMOTE_DIR || 'public_html/' }}
          dangerous-clean-slate: false
